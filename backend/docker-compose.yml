services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tripdb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tripdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (optional - for full containerization)
  # Uncomment if you want to run the backend in Docker too
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: tripdb_backend
  #   restart: unless-stopped
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     NODE_ENV: development
  #     PORT: 5000
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tripdb?schema=public
  #     JWT_SECRET: ${JWT_SECRET}
  #     JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
  #     JWT_EXPIRES_IN: 15m
  #     JWT_REFRESH_EXPIRES_IN: 7d
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app
  #     - /app/node_modules

volumes:
  postgres_data:
    driver: local
